services:
  traefik:
    image: "traefik:v3.5"
    container_name: "traefik_gatekeeper"
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"     # The main HTTP entrypoint
      - "8080:8080" # The Traefik Dashboard (so you can see your routes)
    volumes:
      # Give Traefik permission to read Docker events
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - traefik_proxy # Connect Traefik to your new network

networks:
  traefik_proxy:
    # Tell Docker Compose that this network is "external"
    # (meaning, it was created manually and not by this file)
    external: true
