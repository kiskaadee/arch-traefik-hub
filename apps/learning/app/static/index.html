<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🎓 Learning Hub</h1>
        <button id="add-course-btn" onclick="showModal()">+ Add Course</button>
    </header>

    <div class="kanban-board">
        <div class="column" id="WIP" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>🚀 WIP</h2>
            <div class="course-list" id="list-WIP"></div>
        </div>
        <div class="column" id="Planning" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>📅 Planning</h2>
            <div class="course-list" id="list-Planning"></div>
        </div>
        <div class="column" id="Archive" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>📦 Archive</h2>
            <div class="course-list" id="list-Archive"></div>
        </div>
    </div>

    <!-- Modal for adding/editing courses -->
    <div id="course-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Add New Course</h2>
            <form id="course-form">
                <input type="hidden" id="course-id">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description"></textarea>
                </div>
                <div class="form-group">
                    <label>Main Link</label>
                    <input type="url" id="main_link" required>
                </div>
                <div class="form-group">
                    <label>Last Milestone Link</label>
                    <input type="url" id="last_link">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option value="WIP">WIP</option>
                        <option value="Planning">Planning</option>
                        <option value="Archive">Archive</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" onclick="closeModal()">Cancel</button>
                    <button type="submit" id="save-btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
